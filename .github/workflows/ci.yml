name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight CI for the same branch when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Python linting — ruff check + ruff format
  # ---------------------------------------------------------------------------
  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: uvx ruff check .
      - run: uvx ruff format --check .

  # ---------------------------------------------------------------------------
  # Python tests + type checking
  # ---------------------------------------------------------------------------
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          uv venv --python python3.11 .venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest --cov=cli -q

      - name: Type check
        run: |
          . .venv/bin/activate
          mypy cli/ --ignore-missing-imports

  # ---------------------------------------------------------------------------
  # Frontend build + E2E tests
  # ---------------------------------------------------------------------------
  e2e:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build

      - name: Ensure Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        run: npx playwright test
