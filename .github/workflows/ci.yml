name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight CI for the same branch when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Python linting — ruff check + ruff format
  # ---------------------------------------------------------------------------
  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: uv tool install ruff
      - run: ruff check .
      - run: ruff format --check .

  # ---------------------------------------------------------------------------
  # Python tests + type checking
  # ---------------------------------------------------------------------------
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: uv pip install --system --python python3.11 -e ".[dev]"

      - name: Run tests
        run: python3.11 -m pytest --cov=cli -q

      - name: Type check
        run: python3.11 -m mypy cli/ --ignore-missing-imports

  # ---------------------------------------------------------------------------
  # Frontend build + E2E tests
  # ---------------------------------------------------------------------------
  e2e:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test
