name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight CI for the same branch when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      # ── Lint ──
      - name: Lint
        run: uvx ruff check . && uvx ruff format --check .

      # ── Python tests + type check ──
      - name: Install Python deps
        run: |
          uv venv --python python3.11 .venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Test
        run: |
          . .venv/bin/activate
          pytest --cov=cli -q

      - name: Type check
        run: |
          . .venv/bin/activate
          mypy cli/ --ignore-missing-imports

      # ── Frontend build + E2E ──
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build dashboard
        working-directory: frontend
        run: npm run build

      - name: Ensure Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium

      - name: E2E tests
        working-directory: frontend
        run: npx playwright test
